<div class="wizard-section" style="display:flex; flex-direction:column; gap:12px;">
  <div style="font-weight:700; font-size:12px; color:var(--accent-light); text-transform:uppercase; border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:4px;">
    <i class="fa-solid fa-pen-nib"></i> 4. Sumber Soal &amp; Komposisi
  </div>
  
  <div style="font-size:11px; font-weight:700; color:var(--t2);">Jumlah Target Soal</div>
  
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
    <div class="form-group">
      <label class="form-label" style="font-size:11px;">PG (Pilihan Ganda)</label>
      <input class="inp" type="number" id="cnt_pg_form" name="cnt_pg" min="0" max="100" value="10" />
    </div>
    <div class="form-group">
      <label class="form-label" style="font-size:11px;">PG Kompleks</label>
      <input class="inp" type="number" id="cnt_pgk_form" name="cnt_pgk" min="0" max="100" value="0" />
    </div>
    <div class="form-group">
      <label class="form-label" style="font-size:11px;">Benar / Salah</label>
      <input class="inp" type="number" id="cnt_bs_form" name="cnt_bs" min="0" max="100" value="0" />
    </div>
    <div class="form-group">
      <label class="form-label" style="font-size:11px;">Essay / Uraian</label>
      <input class="inp" type="number" id="cnt_essay_form" name="cnt_essay" min="0" max="100" value="0" />
    </div>
  </div>
</div>
