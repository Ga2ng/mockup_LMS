<div class="wizard-section" style="display:flex; flex-direction:column; gap:12px;">
  <div style="font-weight:700; font-size:12px; color:var(--accent-light); text-transform:uppercase; border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:4px;">
    <i class="fa-solid fa-sliders"></i> 2. Setting Ujian / Keamanan
  </div>
  
  <div class="settings-grid">
    <label class="setting-card"><input type="checkbox" name="require_exambro" value="1"> <span>Wajib pakai EXAMBRO (Lockdown Browser)</span></label>
    <label class="setting-card"><input type="checkbox" name="use_access_code" value="1" checked> <span>Pakai kode akses / token soal</span></label>
    <label class="setting-card"><input type="checkbox" name="show_score_after_finish" value="1" checked> <span>Tampilkan nilai setelah selesai</span></label>
    <label class="setting-card"><input type="checkbox" name="show_answer_after_finish" value="1"> <span>Tampilkan jawaban setelah selesai</span></label>
    <label class="setting-card"><input type="checkbox" name="show_key_after_finish" value="1"> <span>Tampilkan kunci setelah selesai</span></label>
    <label class="setting-card"><input type="checkbox" name="require_webcam" value="1"> <span>Wajib pakai webcam (Proctoring aktif)</span></label>
    <label class="setting-card"><input type="checkbox" name="essay_upload_enabled" value="1"> <span>Uraian boleh upload file/gambar/video/link</span></label>
    <label class="setting-card"><input type="checkbox" name="essay_text_enabled" value="1" checked> <span>Uraian diisi teks langsung di sistem</span></label>
  </div>
</div>
