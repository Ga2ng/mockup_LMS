<div class="collapse sf-hidden" id="tokenBox" style="margin-bottom:16px;">
  <div style="background:var(--s2); border:1px solid var(--line); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:12px;">
    <div style="font-family:'Poppins', sans-serif; font-weight:700; font-size:13px; color:var(--t1); display:flex; align-items:center; gap:8px;">
      <i class="fa-solid fa-key" style="color:var(--amber);"></i> Token Dinamis Keamanan Ujian
    </div>
    <div style="font-size:11px; color:var(--t3); line-height:1.5;">
      Gunakan token dinamis untuk mengunci kelas ujian agar hanya siswa yang hadir fisik / terverifikasi yang bisa memulai pengerjaan. Token akan otomatis kedaluwarsa sesuai waktu durasi token.
    </div>
    
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
      <button type="button" class="btn sm primary" style="background:var(--green); border-color:var(--green);"><i class="fa-solid fa-plus"></i> Generate Token Baru</button>
      <button type="button" class="btn sm"><i class="fa-solid fa-ban"></i> Matikan Semua Token</button>
    </div>
  </div>
